name: Daily Sentiment Scraper

on:
  schedule:
    # Runs at 02:37 UTC (which is exactly 8:07 AM IST) every single day
    - cron: '37 2 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    # --- THIS IS THE FIX FOR EXIT CODE 128 ---
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install transformers torch yfinance

    - name: Run Universe Auditor
      run: python auditor.py

    - name: Run Daily Scraper
      run: python daily_scraper.py

    - name: Commit and Push Data
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add sentiment_history.csv
        git commit -m "data: auto-update daily sentiment records" || echo "No new data to commit"
        git push
