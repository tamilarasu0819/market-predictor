name: Daily Sentiment Scraper

# 1. When should this run?
on:
  schedule:
    # Runs at 16:00 UTC (9:30 PM IST) every Monday through Friday
    - cron: '0 16 * * 1-5'
  workflow_dispatch: # Allows you to click a manual "Run Now" button on GitHub

# 2. What kind of computer should we use?
jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    # 3. Download your code onto the server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 4. Install Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 5. Install the AI Brain
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install transformers torch yfinance

    # 6. Run the Health Check (This triggers the email if it fails!)
    - name: Run Universe Auditor
      run: python auditor.py

    # 7. Run your scraping script!
    - name: Run Daily Scraper
      run: python daily_scraper.py

    # 8. Save the updated CSV file back to your repository
    - name: Commit and Push Data
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add sentiment_history.csv
        git commit -m "data: auto-update daily sentiment records" || echo "No new data to commit"
        git push